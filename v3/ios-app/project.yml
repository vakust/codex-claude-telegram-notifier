name: NotifierV3
options:
  bundleIdPrefix: com.notifier
targets:
  NotifierV3:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NotifierV3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notifier.v3.ios
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        SWIFT_VERSION: 5.9
    info:
      path: NotifierV3/Info.plist
      properties:
        CFBundleDisplayName: NotifierV3
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
